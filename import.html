<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      :root {
        --color-bg: oklch(0.1139 0.0665 285.12deg);
        --color-surface-1: oklch(0.1539 0.0665 285.12deg);
        --color-surface-2: oklch(0.2039 0.0665 285.12deg);
        --color-surface-3: oklch(0.3039 0.0665 285.12deg);
        --color-surface-3-hover: oklch(0.5039 0.0665 285.12deg);
        --color-surface-3-success: oklch(0.5053 0.1039 142.5deg);

        --color-success: oklch(0.5053 0.1039 142.5deg);
        --color-text-secundary-muted: oklch(0.9539 0.0665 285.12deg / 0.3);

        --color-foreground: oklch(0.9539 0.0665 285.12deg);
        --color-foreground-accent: oklch(0.7039 0.0665 285.12deg);
        --color-foreground-hover: oklch(0.8039 0.0665 285.12deg);

        --color-foreground-secundary: oklch(0.8269 0.1951 103.25deg);
        --color-foreground-secundary-accent: oklch(0.6 0.1951 103.25deg);
        --color-foreground-secundary-hover: oklch(0.95 0.1951 103.25deg);

        --cell-row: 5.5rem;
        --cell-column: 15rem;
        --number-columns: 14;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: sans-serif;
      }

      body {
        display: flex;
        height: 100vh;
        overflow-y: hidden;
        background: var(--color-bg);
        padding: 1rem;
      }

      main {
        display: flex;
        height: 100vh;
        gap: 2rem;
        overflow-y: hidden;
        padding-inline: 1rem;
        flex: 1 1 auto;
      }

      sidebar {
        height: 100vh;
        overflow-y: hidden;
        width: 20rem;
        background: var(--color-surface-1);
        padding: 1rem;
        flex: 0 0 auto;
        border-radius: 1.25rem;
      }

      .user-info {
        display: flex;
        gap: 2rem;
        align-items: center;
        justify-content: space-between;
        margin-block: 1.5rem;
      }

      .icon {
        width: 2.5rem;
        aspect-ratio: 1/1;
        border-radius: 50%;
        display: inline-block;
        background-color: aliceblue;
        flex: 0 0 auto;
      }

      .info {
        display: flex;
        align-items: center;
        gap: 0.5rem;

        & > h4 {
          font-size: 1.25rem;
          color: var(--color-foreground);
        }
      }

      .items-sidebar {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 1rem;

        & > li > a {
          padding: 0.5rem;
          background: var(--color-surface-3);
          border-radius: 1rem;
          color: var(--color-foreground);
          text-decoration: none;
          gap: 0.5rem;
          font-size: 1rem;
          font-weight: bold;
          display: flex;
          align-items: center;

          & > div.icon {
            width: 2rem;
          }

          &:hover {
            background: var(--color-surface-3-hover);
          }
        }
      }

      .import-section {
        display: flex;
        flex-direction: column;
        background: var(--color-surface-2);
        color: var(--color-foreground);
        padding: 1rem;
        gap: 1rem;
        height: fit-content;
        border-radius: 1rem;
      }

      .import-text {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        & label {
        }

        & div {
          width: 20rem;
        }
      }

      .preview-section {
        background: var(--color-surface-2);
        padding: 0.5rem 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        border-radius: 1rem;
        overflow-y: auto;
      }

      .preview-item {
        background: var(--color-surface-3);
        color: var(--color-foreground);
        display: flex;
        padding: 0.75rem;
        position: relative;
        opacity: 0.8;
        border-radius: 0.5rem;
        margin-top: 1rem;
        flex: 1 1 auto;

        & div {
          width: 27rem;
          display: flex;
          flex-direction: column;
        }

        & h3 {
          font-size: 1.5rem;
          flex: 0 0 auto;
        }
        & p {
          font-size: 1rem;
          flex: 1 0 auto;
        }
        & span {
          display: flex;
          flex: 0 0 auto;
        }
        & img {
          width: 12rem;
          height: 6rem;
          border-radius: 0.5rem;
        }

        & label {
          position: absolute;
          top: 0.75rem;
          right: 0.75rem;
        }
      }

      .check-add {
        width: 2.5rem;
        border-radius: 0.75rem;
        border: 1px solid var(--color-surface-2);
        height: 1.25rem;
        -webkit-appearance: none;
        -moz-appearance: none;
        position: relative;
        cursor: pointer;

        &::after {
          content: "";
          background-color: color-mix(
            var(--color-foreground-secundary),
            transparent
          );
          width: calc(50% - 2px);
          height: calc(100% - 2px);
          top: 1px;
          left: 2px;
          border-radius: 50%;
          position: absolute;
          transform: translateX(0);
          transition: transform 0.5s;
        }

        &:checked {
          border: 1px solid var(--color-foreground-secundary);
        }

        &:checked::after {
          transform: translateX(19px);
          background-color: var(--color-foreground-secundary);
        }
      }

      .btn-import {
        width: 10rem;
        padding: 1rem 2rem;
        border-radius: 1rem;
        border: none;
        background: var(--color-foreground-secundary);
        margin: auto;
        cursor: pointer;
      }

      .import-area {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 8rem;
        width: 20rem;
        background-color: var(--color-surface-3);
        border-radius: 1rem;
        padding: 1rem;
        cursor: pointer;
      }

      .import-area.highlight {
        box-shadow: 0 0 3px 2px var(--color-foreground-secundary-accent);
      }

      .preview-item:has(input:checked) {
        opacity: 1;
      }

      .game-filter-icon::after {
        content: "";
        top: 0;
        left: 0;
        position: absolute;
        z-index: -1;
        display: block;
        border-radius: inherit;
        width: 100%;
        height: 100%;
        box-shadow: var(--color-foreground-secundary-accent) 0 0 1px 4px;
        opacity: 0;
        transition: opacity 0.7s;
      }

      .active::after {
        opacity: 1;
      }

      .game-filter {
        display: flex;
        gap: 1rem;
        justify-content: center;
        position: relative;
      }
    </style>
  </head>

  <body>
    <template id="template-preview-element">
      <li class="preview-item">
        <div>
          <h3 class="title-prev">Tittle</h3>
          <p class="desc-prev">Description</p>
          <footer>
            <p class="date-prev">19/01/2026 - 20/01/2026</p>
          </footer>
        </div>
        <label for="">
          <input class="check-add" type="checkbox" checked />
        </label>
        <img
          class="img-prev"
          src="https://i.fbcd.co/products/resized/resized-750-500/563d0201e4359c2e890569e254ea14790eb370b71d08b6de5052511cc0352313.webp"
          alt=""
        />
      </li>
    </template>
    <sidebar>
      <div class="user-info">
        <div class="info">
          <div class="icon"></div>
          <h4>User Name</h4>
        </div>
        <div class="icon"></div>
      </div>
      <div>
        <ul class="items-sidebar">
          <li>
            <a href="/home.html">
              <div class="icon"></div>
              Home
            </a>
          </li>
          <li>
            <a href="/schedyule.html">
              <div class="icon"></div>
              Schedule
            </a>
          </li>
          <li>
            <a href="/milistone.html">
              <div class="icon"></div>
              Milstones
            </a>
          </li>

          <li>
            <a href="/import.html">
              <div class="icon"></div>
              Import Events
            </a>
          </li>
        </ul>
      </div>
    </sidebar>
    <main>
      <div class="import-section">
        <h3>Import Data</h3>
        <div class="import-area">
          <p>Drag and Drop Json File</p>
          <input id="file-json" type="file" accept=".json" hidden />
        </div>
        <div class="game-filter">
          <div class="icon game-filter-icon"></div>
          <div class="icon game-filter-icon"></div>
          <div class="icon game-filter-icon"></div>
          <div class="icon game-filter-icon"></div>
          <div class="icon game-filter-icon"></div>
        </div>
        <button class="btn-import">Import</button>
      </div>
      <div class="preview-section">
        <ul id="content-preview">
          <li class="preview-item">
            <div>
              <h3>Tittle</h3>
              <p>Description</p>
              <footer>
                <p>19/01/2026 - 20/01/2026</p>
              </footer>
            </div>
            <label for="">
              <input class="check-add" type="checkbox" checked />
            </label>
            <img
              src="https://i.fbcd.co/products/resized/resized-750-500/563d0201e4359c2e890569e254ea14790eb370b71d08b6de5052511cc0352313.webp"
              alt=""
            />
          </li>
        </ul>
      </div>
      <div></div>
    </main>
  </body>
  <script type="module">
    const dropArea = document.querySelector(".import-area");
    const input_file = document.querySelector("#file-json");
    const template = document.querySelector("#template-preview-element")
    const eventEnter = ["dragenter", "dragover"];
    const eventOut = ["dragleave", "drop"];

    eventEnter.forEach((eventName) => {
      dropArea.addEventListener(eventName, (e) => {
        e.preventDefault();
        e.stopPropagation();
        dropArea.classList.add("highlight");
      });
    });

    eventOut.forEach((eventName) => {
      dropArea.addEventListener(eventName, (e) => {
        e.preventDefault();
        e.stopPropagation();
        dropArea.classList.remove("highlight");
      });
    });

    dropArea.addEventListener("drop", handleDrop, false);

    function handleDrop(e) {
      const dt = e.dataTransfer;
      const file = dt.files;

      input_file.files = file;

      input_file.dispatchEvent(new Event("change"));
    }

    dropArea.addEventListener("click", () => {
      input_file.click();
    });

    let content_preview = document.querySelector("#content-preview");
    let json_data
    let no_add = []

    const  toggle_deselect_item = (data_id) => {
      
      if(no_add.includes(data_id))
        return no_add = no_add.filter(i => i != data_id)

        no_add.push(data_id)
    }

    function preview(item) {
      let { tittle, desc, init, finish, img } = item;

      let data_id = tittle.replaceAll(/[: ]/g, "_").toLowerCase();

      const clone = document.importNode(template.content, true);

      clone.querySelector(".title-prev").textContent = tittle
      clone.querySelector(".desc-prev").textContent = desc
      clone.querySelector(".date-prev").textContent = `${init} - ${finish}`
      clone.querySelector(".img-prev").src = img  
      clone.querySelector(".check-add").addEventListener('change', () => toggle_deselect_item(data_id))

      content_preview.appendChild(clone);
    }

    input_file.addEventListener("change", async function () {

      content_preview.innerHTML = ''
      // Read the file
      let [file] = input_file.files;

      let data = await file.text();

      json_data = Array.from(JSON.parse(data));

      json_data.map((i) => preview(i));
    });
  
    document.querySelector(".btn-import").addEventListener("click", () => {
      let result = json_data.filter(i => {
        let id = i.tittle.replaceAll(/[: ]/g, "_").toLowerCase();
        return !no_add.includes(id)
      })

      let result_json = JSON.stringify(result) 

      console.log(result_json)
    })
  </script>
</html>
